{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Wishlist</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <div class="books-container">

        <h1 class="section-title">

            My Wishlist ❤️

        </h1>

        <div class="books-grid">

            {% for book in books %}

            <div class="book-card">

                <img src="{{ book.image.url }}">

                <div class="book-content">

                    <h4>{{ book.title }}</h4>

                    <p>

                        <strong>Author:</strong>

                        {{ book.author }}

                    </p>

                    <p>

                        <strong>Category:</strong>

                        {{ book.category }}

                    </p>

                    <p>

                        <strong>Stock:</strong>

                        {{ book.stock }}

                    </p>

                    <a href="{% url 'book_detail' book.id %}" class="details-btn">

                        View Details

                    </a>

                    <a href="{% url 'remove_from_wishlist' book.id %}" class="remove-btn">

                        Remove

                    </a>

                </div>

            </div>

            {% empty %}

            <div class="empty-container">

                <div class="empty-icon">❤️</div>

                <h2>No Books In Wishlist</h2>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>

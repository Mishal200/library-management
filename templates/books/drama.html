{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Drama Books</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="books-container">

    <h1 class="section-title">Drama Books</h1>

    <div class="books-grid">

        {% for book in books %}

        <div class="book-card">

            <img src="{{ book.image.url }}">

            <div class="book-content">

                <h4>{{ book.title }}</h4>

                <p><strong>Author:</strong> {{ book.author }}</p>

                <p><strong>Category:</strong> {{ book.category }}</p>

                <a href="{% url 'book_detail' book.id %}" class="details-btn">
                    View Details
                </a>

            </div>

        </div>

        {% empty %}

        <h2>No Drama Books Found</h2>

        {% endfor %}

    </div>

</div>

</body>
</html>
